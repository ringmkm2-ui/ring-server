<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bro Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .powered-by {
      position: absolute;
      bottom: 80px;
      left: 0;
      right: 0;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.2s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .powered-by-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }

    .powered-by-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .logo-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .logo-item img {
      height: 18px;
      width: auto;
    }

    /* スケール拡大遷移 */
    .transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .transition-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .scale-panel {
      width: 40px;
      height: 40px;
      background: #ffffff;
      border-radius: 50%;
      will-change: transform, border-radius, width, height;
    }

    .scale-panel.expanding {
      animation: panelExpand 0.7s cubic-bezier(0.65, 0, 0.35, 1) forwards;
    }

    @keyframes panelExpand {
      to {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="powered-by">
    <div class="powered-by-label">POWERED BY</div>
    <div class="powered-by-logos">
      <div class="logo-item">
        <img src="/images/logo-black.jpg" alt="Claude">
      </div>
      <div class="logo-item">
        <img src="/images/render-logo.svg" alt="Render">
      </div>
    </div>
  </div>

  <div class="transition-overlay" id="transitionOverlay">
    <div class="scale-panel" id="scalePanel"></div>
  </div>

  <script>
    (function() {
      const token = localStorage.getItem('ring_token');

      if (token) {
        window.location.href = '/talklist.html';
        return;
      }

      const MIN_SPLASH_TIME = 2000;
      const startTime = Date.now();

      function navigate() {
        const elapsed = Date.now() - startTime;
        const remaining = Math.max(0, MIN_SPLASH_TIME - elapsed);

        setTimeout(() => {
          playTransitionAndGo('/welcome.html');
        }, remaining);
      }

      function playTransitionAndGo(destination) {
        const overlay = document.getElementById('transitionOverlay');
        const panel = document.getElementById('scalePanel');

        overlay.classList.add('active');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            panel.classList.add('expanding');
          });
        });

        panel.addEventListener('animationend', () => {
          window.location.href = destination;
        }, { once: true });
      }

      if ('requestIdleCallback' in window) {
        requestIdleCallback(navigate, { timeout: 500 });
      } else {
        navigate();
      }

      // Service Worker登録（オフライン対応とキャッシュ管理）
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('SW registered');
          // 新しいSWがインストール完了したら、ユーザーに通知（スキップして続行できる）
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // 新しいバージョン利用可能（ページ再読み込みなし）
                console.log('New version available (no reload needed)');
              }
            });
          });
        }).catch(err => console.log('SW registration failed:', err));
      }
    })();
  </script>
</body>
</html>
