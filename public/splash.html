<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bro Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .splash-content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.15s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .app-name {
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -1px;
      margin-bottom: 60px;
    }

    .powered-by {
      position: absolute;
      bottom: 64px;
      left: 0;
      right: 0;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.5s forwards;
    }

    .powered-by-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 400;
      margin-bottom: 6px;
    }

    .powered-by-brands {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 500;
    }

    .powered-by-brands svg {
      width: 20px;
      height: 20px;
    }

    /* スケール拡大遷移 */
    .transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .transition-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .scale-panel {
      width: 40px;
      height: 40px;
      background: #ffffff;
      border-radius: 50%;
      will-change: transform, border-radius, width, height;
    }

    .scale-panel.expanding {
      animation: panelExpand 0.7s cubic-bezier(0.65, 0, 0.35, 1) forwards;
    }

    @keyframes panelExpand {
      to {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="splash-content">
    <div class="app-name">Bro chat</div>
  </div>

  <div class="powered-by">
    <div class="powered-by-label">Powered by</div>
    <div class="powered-by-brands">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>Claude</span>
    </div>
    <div class="powered-by-brands">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 3H21V21H3Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span>Render</span>
    </div>
  </div>

  <div class="transition-overlay" id="transitionOverlay">
    <div class="scale-panel" id="scalePanel"></div>
  </div>

  <script>
    (function() {
      const token = localStorage.getItem('ring_token');

      if (token) {
        window.location.href = '/talklist.html';
        return;
      }

      const MIN_SPLASH_TIME = 2000;
      const startTime = Date.now();

      function navigate() {
        const elapsed = Date.now() - startTime;
        const remaining = Math.max(0, MIN_SPLASH_TIME - elapsed);

        setTimeout(() => {
          playTransitionAndGo('/welcome.html');
        }, remaining);
      }

      function playTransitionAndGo(destination) {
        const overlay = document.getElementById('transitionOverlay');
        const panel = document.getElementById('scalePanel');

        overlay.classList.add('active');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            panel.classList.add('expanding');
          });
        });

        panel.addEventListener('animationend', () => {
          window.location.href = destination;
        }, { once: true });
      }

      if ('requestIdleCallback' in window) {
        requestIdleCallback(navigate, { timeout: 500 });
      } else {
        navigate();
      }
    })();
  </script>
</body>
</html>
