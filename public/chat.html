<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>チャット</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100%; overflow:hidden; background:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }

    /* ヘッダー */
    .header {
      position:fixed; top:0; left:0; right:0; height:60px;
      background:#fff; border-bottom:1px solid #eee;
      display:flex; align-items:center; padding:0 16px; gap:12px; z-index:100;
    }
    .back-btn { font-size:24px; color:#333; cursor:pointer; padding:4px 8px; }
    .header-avatar {
      width:38px; height:38px; border-radius:50%;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex; align-items:center; justify-content:center;
      color:#fff; font-weight:600; font-size:15px; flex-shrink:0;
      overflow:hidden;
    }
    .header-avatar img { width:100%; height:100%; object-fit:cover; }
    .header-info { flex:1; min-width:0; }
    .header-name { font-size:16px; font-weight:600; color:#111; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .header-status { font-size:12px; color:#888; }

    /* メッセージエリア */
    .messages {
      position:fixed; top:60px; bottom:72px; left:0; right:0;
      overflow-y:auto; padding:16px 12px;
      display:flex; flex-direction:column; gap:8px;
      -webkit-overflow-scrolling:touch;
    }

    .msg-row { display:flex; align-items:flex-end; gap:8px; }
    .msg-row.mine { flex-direction:row-reverse; }

    .msg-avatar {
      width:30px; height:30px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex; align-items:center; justify-content:center;
      color:#fff; font-size:12px; font-weight:600;
      overflow:hidden;
    }
    .msg-avatar img { width:100%; height:100%; object-fit:cover; }
    .msg-row.mine .msg-avatar { display:none; }

    .bubble {
      max-width:70%; padding:10px 14px; border-radius:18px;
      font-size:15px; line-height:1.4; word-break:break-word;
    }
    .msg-row.theirs .bubble {
      background:#f0f0f0; color:#111;
      border-bottom-left-radius:4px;
    }
    .msg-row.mine .bubble {
      background:linear-gradient(135deg,#667eea,#764ba2);
      color:#fff; border-bottom-right-radius:4px;
    }
    .msg-time { font-size:10px; color:#aaa; flex-shrink:0; margin-bottom:4px; }

    /* 日付区切り */
    .date-divider {
      text-align:center; font-size:12px; color:#aaa;
      margin:8px 0; position:relative;
    }
    .date-divider::before {
      content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:#eee;
    }
    .date-divider span { background:#fff; padding:0 12px; position:relative; }

    /* 入力エリア */
    .input-area {
      position:fixed; bottom:0; left:0; right:0; height:72px;
      background:#fff; border-top:1px solid #eee;
      display:flex; align-items:center; padding:0 12px; gap:10px;
    }
    .msg-input {
      flex:1; padding:10px 16px; border:1.5px solid #e0e0e0; border-radius:24px;
      font-size:15px; outline:none; resize:none; max-height:80px;
      font-family:inherit; line-height:1.4;
      transition:border-color 0.2s;
    }
    .msg-input:focus { border-color:#667eea; }
    .send-btn {
      width:42px; height:42px; border-radius:50%; border:none;
      background:linear-gradient(135deg,#667eea,#764ba2);
      color:#fff; font-size:18px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:transform 0.15s, opacity 0.15s;
    }
    .send-btn:active { transform:scale(0.92); }
    .send-btn:disabled { opacity:0.4; }

    /* ローディング */
    .loading { text-align:center; color:#aaa; font-size:14px; padding:32px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="back-btn" onclick="history.back()">‹</span>
    <div class="header-avatar" id="headerAvatar"></div>
    <div class="header-info">
      <div class="header-name" id="headerName">読み込み中...</div>
      <div class="header-status" id="headerStatus"></div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="loading">メッセージを読み込み中...</div>
  </div>

  <div class="input-area">
    <textarea class="msg-input" id="msgInput" placeholder="メッセージを入力..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <script>
    const token = localStorage.getItem('ring_token');
    const myUserId = localStorage.getItem('ring_userId');
    const params = new URLSearchParams(location.search);
    const otherId = params.get('userId');
    const otherName = params.get('name') || '相手';
    const otherPic = params.get('pic');

    if (!token || !otherId) location.href = '/auth.html';

    // ヘッダー設定
    document.getElementById('headerName').textContent = otherName;
    const av = document.getElementById('headerAvatar');
    if (otherPic) {
      av.innerHTML = `<img src="${otherPic}">`;
    } else {
      av.textContent = otherName[0] || '?';
    }

    let ws = null;
    let messages = [];
    let pollInterval = null;

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...(opts.headers || {}) },
      });
      return res.json();
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const h = d.getHours().toString().padStart(2, '0');
      const m = d.getMinutes().toString().padStart(2, '0');
      return h + ':' + m;
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const today = new Date();
      if (d.toDateString() === today.toDateString()) return '今日';
      const yesterday = new Date(today - 86400000);
      if (d.toDateString() === yesterday.toDateString()) return '昨日';
      return d.getMonth()+1 + '月' + d.getDate() + '日';
    }

    function renderMessages(msgs) {
      const container = document.getElementById('messages');
      if (!msgs.length) {
        container.innerHTML = '<div class="loading">まだメッセージがありません</div>';
        return;
      }

      let html = '';
      let lastDate = '';

      msgs.forEach(msg => {
        const dateStr = formatDate(msg.createdAt);
        if (dateStr !== lastDate) {
          html += `<div class="date-divider"><span>${dateStr}</span></div>`;
          lastDate = dateStr;
        }

        const isMine = msg.senderId === myUserId;
        const rowClass = isMine ? 'mine' : 'theirs';
        const initial = otherName[0] || '?';

        html += `
          <div class="msg-row ${rowClass}">
            ${!isMine ? `<div class="msg-avatar">${otherPic ? `<img src="${otherPic}">` : initial}</div>` : ''}
            <div class="bubble">${escapeHtml(msg.content)}</div>
            <div class="msg-time">${formatTime(msg.createdAt)}</div>
          </div>
        `;
      });

      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
    }

    function addOrUpdateMessage(msg) {
      const idx = messages.findIndex(m => m.id === msg.id);
      if (idx === -1) {
        messages.push(msg);
      } else {
        messages[idx] = msg;
      }
      messages.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      renderMessages(messages);
    }

    async function loadHistory() {
      try {
        const data = await api('/api/messages/history/' + otherId);
        if (Array.isArray(data)) {
          // マージ: 既存メッセージをID基準で置き換え、重複させない
          const merged = new Map();
          messages.forEach(m => merged.set(m.id, m));
          data.forEach(m => merged.set(m.id, m));
          messages = Array.from(merged.values()).sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
          renderMessages(messages);
        }
      } catch (e) {
        console.error('loadHistory error:', e);
      }
    }

    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const content = input.value.trim();
      if (!content) return;

      input.value = '';
      input.style.height = 'auto';

      try {
        const data = await api('/api/messages/send', {
          method: 'POST',
          body: JSON.stringify({ recipientId: otherId, content }),
        });
        if (data.message) {
          addOrUpdateMessage(data.message);
        }
      } catch (e) {
        console.error('sendMessage error:', e);
        input.value = content; // 失敗したら戻す
      }
    }

    // Enterで送信、Shift+Enterで改行
    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // テキストエリア自動リサイズ
    document.getElementById('msgInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 80) + 'px';
    });

    // WebSocket接続
    function connectWS() {
      const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'auth', token }));
        document.getElementById('headerStatus').textContent = 'オンライン';
      };

      ws.onmessage = e => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'new_message') {
            const msg = data.message;
            if ((msg.senderId === otherId && msg.recipientId === myUserId) ||
                (msg.senderId === myUserId && msg.recipientId === otherId)) {
              addOrUpdateMessage(msg);
            }
          }
        } catch (err) {}
      };

      ws.onclose = () => {
        document.getElementById('headerStatus').textContent = '';
        // 5秒後に再接続
        setTimeout(connectWS, 5000);
      };

      ws.onerror = () => ws.close();
    }

    // ポーリング（WS補完）
    function startPolling() {
      pollInterval = setInterval(loadHistory, 5000);
    }

    // 初期化
    loadHistory();
    connectWS();
    startPolling();
  </script>
</body>
</html>
