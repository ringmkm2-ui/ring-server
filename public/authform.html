<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring - ログイン</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
      padding: 40px 30px;
      text-align: center;
    }

    .logo {
      width: 60px;
      height: 60px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: white;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 40px;
    }

    .auth-section {
      margin-bottom: 30px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
      color: #ccc;
    }

    .divider span {
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    .divider p {
      margin: 0 10px;
      font-size: 13px;
      color: #999;
    }

    .form-group {
      margin-bottom: 16px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
      font-family: inherit;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-google {
      background: white;
      border: 1px solid #e0e0e0;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .btn-google:hover {
      background: #f8f8f8;
      border-color: #d0d0d0;
    }

    .btn-login {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-bottom: 12px;
    }

    .btn-login:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-signup {
      background: #f0f0f0;
      color: #667eea;
      border: none;
    }

    .btn-signup:hover {
      background: #e8e8e8;
    }

    .toggle-form {
      margin-top: 20px;
      font-size: 13px;
      color: #666;
    }

    .toggle-form a {
      color: #667eea;
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
    }

    .toggle-form a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .spinner {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: currentColor;
      border-radius: 50%;
      animation: spin 0.6s infinite;
    }

    @keyframes spin {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .google-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%234285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="%2334A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="%23FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="%23EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>') no-repeat center;
      background-size: contain;
    }

    .auth-mode-switch {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      transition: all 0.3s;
    }

    .mode-btn.active {
      border-color: #667eea;
      color: #667eea;
      background: rgba(102, 126, 234, 0.05);
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔷</div>
    <h1>Ring</h1>
    <p class="subtitle">安全なチャットアプリ</p>

    <div class="auth-mode-switch">
      <button class="mode-btn active" onclick="switchMode('login')">ログイン</button>
      <button class="mode-btn" onclick="switchMode('signup')">新規登録</button>
    </div>

    <div id="errorMsg" class="error-message"></div>
    <div id="successMsg" class="success-message"></div>

    <!-- ログインフォーム -->
    <div id="loginSection" class="form-section active">
      <div class="auth-section">
        <button class="btn btn-google" onclick="loginWithGoogle()">
          <span class="google-icon"></span>
          Google でログイン
        </button>
      </div>

      <div class="divider">
        <span></span>
        <p>または</p>
        <span></span>
      </div>

      <form onsubmit="emailLogin(event)">
        <div class="form-group">
          <input type="email" id="loginEmail" placeholder="メールアドレス" required>
        </div>
        <div class="form-group">
          <input type="password" id="loginPassword" placeholder="パスワード" required>
        </div>
        <button type="submit" class="btn btn-login">ログイン</button>
      </form>
    </div>

    <!-- 登録フォーム -->
    <div id="signupSection" class="form-section">
      <div class="auth-section">
        <button class="btn btn-google" onclick="signupWithGoogle()">
          <span class="google-icon"></span>
          Google で登録
        </button>
      </div>

      <div class="divider">
        <span></span>
        <p>または</p>
        <span></span>
      </div>

      <form onsubmit="emailSignup(event)">
        <div class="form-group">
          <input type="text" id="signupName" placeholder="表示名" required>
        </div>
        <div class="form-group">
          <input type="email" id="signupEmail" placeholder="メールアドレス" required>
        </div>
        <div class="form-group">
          <input type="password" id="signupPassword" placeholder="パスワード（6文字以上）" required minlength="6">
        </div>
        <button type="submit" class="btn btn-login">登録</button>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    function switchMode(mode) {
      document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
      
      if (mode === 'login') {
        document.getElementById('loginSection').classList.add('active');
        document.querySelectorAll('.mode-btn')[0].classList.add('active');
      } else {
        document.getElementById('signupSection').classList.add('active');
        document.querySelectorAll('.mode-btn')[1].classList.add('active');
      }

      clearMessages();
    }

    function showError(message) {
      const errorEl = document.getElementById('errorMsg');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      setTimeout(() => {
        errorEl.style.display = 'none';
      }, 5000);
    }

    function showSuccess(message) {
      const successEl = document.getElementById('successMsg');
      successEl.textContent = message;
      successEl.style.display = 'block';
    }

    function clearMessages() {
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('successMsg').style.display = 'none';
    }

    async function emailLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const response = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'ログインに失敗しました');
        }

        // ローカルストレージに保存
        localStorage.setItem('ring_token', data.token);
        localStorage.setItem('ring_user_id', data.userId);
        localStorage.setItem('ring_username', data.username);
        localStorage.setItem('ring_display_name', data.displayName);

        showSuccess('ログイン成功！');
        setTimeout(() => {
          window.location.href = '/talklist.html';
        }, 1000);
      } catch (error) {
        showError(error.message);
      }
    }

    async function emailSignup(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;

      try {
        const response = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: email, password, displayName: name })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || '登録に失敗しました');
        }

        localStorage.setItem('ring_token', data.token);
        localStorage.setItem('ring_user_id', data.userId);
        localStorage.setItem('ring_username', data.username);
        localStorage.setItem('ring_display_name', data.displayName);

        showSuccess('登録成功！ログイン中...');
        setTimeout(() => {
          window.location.href = '/talklist.html';
        }, 1000);
      } catch (error) {
        showError(error.message);
      }
    }

    function loginWithGoogle() {
      // TODO: Google OAuth フロー実装
      // 本来は Google OAuth library (google-auth-library) を使用します
      showError('Google ログインは近日実装予定です');
    }

    function signupWithGoogle() {
      // TODO: Google OAuth フロー実装
      showError('Google 登録は近日実装予定です');
    }

    // ページロード時にログイン状態をチェック
    window.addEventListener('load', () => {
      const token = localStorage.getItem('ring_token');
      if (token) {
        // 既にログイン済み
        window.location.href = '/talklist.html';
      }
    });
  </script>
</body>
</html>
